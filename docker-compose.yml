services:
  # ── MySQL Database ──────────────
  mysql:
    image: mysql:8.0
    container_name: cprp_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper ──────────────────
  zookeeper:
    image: zookeeper:3.7
    container_name: cprp_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1

  # ── Kafka ──────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: cprp_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_MS: 604800000 # 7-day retention
      KAFKA_LOG_RETENTION_BYTES: 1073741824 # 1GB max per partition
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      - zookeeper

# ── Persistent storage ───────────
volumes:
  mysql_data:
  kafka_data:
